<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محادثة خاصة مؤقتة</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #e8ded2; display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 8px;
    }
    .container {
      width: 100%; max-width: 480px; background: #fff;
      border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      overflow: hidden; display: flex; flex-direction: column;
      height: 92vh; max-height: 780px;
    }
    .header {
      background: #075e54; color: #fff; padding: 12px 15px;
      text-align: center; font-weight: bold; font-size: 1.1em;
    }
    .status-bar {
      background: #fff; padding: 8px 15px; font-size: 0.8em;
      text-align: center; border-bottom: 1px solid #ddd;
      color: #555; min-height: 30px; display: flex;
      align-items: center; justify-content: center; gap: 8px;
      flex-wrap: wrap;
    }
    .timer { font-weight: bold; color: #c0392b; background: #fdecea; padding: 2px 10px; border-radius: 12px; }
    .controls { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
    .btn {
      background: #fff; border: 1px solid #ccc; border-radius: 20px;
      padding: 6px 12px; font-size: 0.8em; cursor: pointer;
      transition: 0.2s; white-space: nowrap;
    }
    .btn:active { transform: scale(0.95); }
    .btn.danger { background: #e74c3c; color: #fff; border: none; }
    .messages {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 4px;
      background: #efeae2;
    }
    .msg {
      max-width: 85%; padding: 8px 12px; border-radius: 8px;
      line-height: 1.4; word-wrap: break-word;
    }
    .me {
      align-self: flex-end; background: #d9fdd3;
      margin-left: 20%; border-top-right-radius: 0;
    }
    .peer {
      align-self: flex-start; background: #fff;
      margin-right: 20%; border-top-left-radius: 0;
    }
    .system-msg {
      align-self: center; background: #e1f3fb; color: #1a6d8a;
      font-size: 0.8em; padding: 4px 12px; border-radius: 8px;
      max-width: 90%; text-align: center;
    }
    .typing-indicator {
      font-size: 0.75em; color: #888; padding: 0 15px 4px;
      min-height: 20px; font-style: italic;
    }
    .input-area {
      display: flex; padding: 8px; gap: 8px;
      background: #f0f0f0; border-top: 1px solid #ddd;
      align-items: center;
    }
    .input-area input {
      flex: 1; padding: 10px 14px; border: none; border-radius: 25px;
      font-size: 0.95em; outline: none; background: #fff;
    }
    .input-area button {
      background: #075e54; color: #fff; border: none;
      border-radius: 50%; width: 42px; height: 42px;
      font-size: 1.2em; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
    .input-area button:disabled { background: #b0bec5; }
    .setup-duration {
      display: flex; flex-direction: column; gap: 12px; padding: 20px; text-align: center;
    }
    .setup-duration select {
      padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 1em;
    }
    .switch-label {
      display: flex; align-items: center; gap: 8px; font-size: 0.9em;
      justify-content: center; margin-top: 5px;
    }
    .modal {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.5);
      justify-content: center; align-items: center; z-index: 10;
    }
    .modal-content {
      background: #fff; padding: 20px; border-radius: 16px;
      text-align: center; max-width: 90%;
    }
    .close-btn {
      background: #ccc; border: none; border-radius: 50%;
      width: 30px; height: 30px; cursor: pointer; margin-top: 10px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">💬 محادثة آمنة</div>
  <div id="setupScreen" class="setup-duration">
    <p>⏱️ اختر مدة صلاحية الغرفة:</p>
    <select id="durationSelect">
      <option value="5">5 دقائق</option>
      <option value="30">30 دقيقة</option>
      <option value="60" selected>1 ساعة</option>
      <option value="360">6 ساعات</option>
      <option value="1440">24 ساعة</option>
      <option value="10080">7 أيام</option>
    </select>
    <label class="switch-label">
      <input type="checkbox" id="autoDeleteCheckbox"> 🔒 حذف رسائل الطرف الآخر تلقائياً
    </label>
    <button class="btn" style="background:#075e54;color:#fff;padding:12px;font-size:1em;" id="createRoomBtn">✨ إنشاء الغرفة</button>
  </div>
  <div id="chatScreen" style="display: none; flex:1; flex-direction: column;">
    <div class="status-bar">
      <span id="statusText">⏳ في انتظار اتصال الطرف الآخر...</span>
      <span class="timer" id="timerDisplay"></span>
      <div class="controls">
        <button class="btn" id="copyLinkBtn">📋 نسخ الرابط</button>
        <button class="btn" id="qrBtn">📷 QR</button>
        <button class="btn danger" id="endChatBtn">✖️ إنهاء</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="input-area">
      <input type="text" id="inputMsg" placeholder="اكتب رسالتك..." disabled />
      <button id="sendBtn" disabled>➤</button>
    </div>
  </div>
</div>
<div class="modal" id="qrModal">
  <div class="modal-content">
    <h3>📱 امسح الكود للانضمام</h3>
    <img id="qrImage" src="" alt="QR" style="max-width:200px; margin:10px;">
    <br><button class="close-btn" id="closeQrBtn">✖</button>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
  // ========== إعدادات PeerJS ==========
  const PEER_CONFIG = {
    host: '0.peerjs.com',
    port: 443,
    secure: true,
    debug: 0
  };

  const setupScreen = document.getElementById('setupScreen');
  const chatScreen = document.getElementById('chatScreen');
  const durationSelect = document.getElementById('durationSelect');
  const autoDeleteCheckbox = document.getElementById('autoDeleteCheckbox');
  const createRoomBtn = document.getElementById('createRoomBtn');
  const statusText = document.getElementById('statusText');
  const timerDisplay = document.getElementById('timerDisplay');
  const messagesDiv = document.getElementById('messages');
  const typingIndicator = document.getElementById('typingIndicator');
  const inputMsg = document.getElementById('inputMsg');
  const sendBtn = document.getElementById('sendBtn');
  const copyLinkBtn = document.getElementById('copyLinkBtn');
  const qrBtn = document.getElementById('qrBtn');
  const endChatBtn = document.getElementById('endChatBtn');
  const qrModal = document.getElementById('qrModal');
  const qrImage = document.getElementById('qrImage');
  const closeQrBtn = document.getElementById('closeQrBtn');

  let peer, conn;
  let roomId, expiryTime;
  let timerInterval;
  let isInitiator = false;
  let chatEnded = false;
  let autoDeleteEnabled = false;

  function addSystemMsg(text) {
    const div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function generateRoomId(durationMinutes) {
    const now = Date.now();
    expiryTime = now + durationMinutes * 60 * 1000;
    const d = new Date(expiryTime);
    const pad = (n) => String(n).padStart(2,'0');
    const dateStr = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    const randomPart = Math.random().toString(36).substring(2, 8);
    return `chat-${dateStr}-${randomPart}`;
  }

  function parseExpiry(roomId) {
    const prefix = 'chat-';
    if (!roomId || !roomId.startsWith(prefix)) return null;
    const dateTimePart = roomId.substring(prefix.length, prefix.length + 16);
    return new Date(dateTimePart).getTime();
  }

  function updateTimer() {
    if (!expiryTime) return;
    const diff = expiryTime - Date.now();
    if (diff <= 0) { endChat('⏰ انتهت صلاحية الغرفة تلقائياً.'); return; }
    const sec = Math.floor(diff / 1000);
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
    timerDisplay.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  function addMessage(text, sender) {
    if (chatEnded) return;
    if (sender === 'peer' && autoDeleteEnabled) {
      const oldPeerMsgs = messagesDiv.querySelectorAll('.msg.peer');
      oldPeerMsgs.forEach(el => el.remove());
    }
    const div = document.createElement('div');
    div.className = 'msg ' + sender;
    div.textContent = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function updateStatus(text) {
    statusText.textContent = text;
  }

  function endChat(reason) {
    if (chatEnded) return;
    chatEnded = true;
    updateStatus(reason);
    if (conn && conn.open) conn.send({ type: 'end', reason });
    if (conn) conn.close();
    if (peer) peer.destroy();
    inputMsg.disabled = true;
    sendBtn.disabled = true;
    clearInterval(timerInterval);
    addSystemMsg(reason);
  }

  function setupConnection(connection) {
    conn = connection;
    conn.on('open', () => {
      if (!chatEnded) {
        updateStatus('✅ تم الاتصال!');
        inputMsg.disabled = false;
        sendBtn.disabled = false;
        addSystemMsg('✅ تم الاتصال. يمكنكما التحدث الآن.');
        updateTimer();
        clearInterval(timerInterval);
        timerInterval = setInterval(updateTimer, 1000);
        if (isInitiator && conn && conn.open) {
          conn.send({ type: 'autoDelete', enabled: autoDeleteEnabled });
        }
      }
    });
    conn.on('data', (data) => {
      if (data.type === 'end') { endChat(data.reason || '✖️ أنهى الطرف الآخر المحادثة.'); return; }
      if (data.type === 'typing') { typingIndicator.textContent = data.isTyping ? '✍️ الطرف الآخر يكتب...' : ''; return; }
      if (data.type === 'autoDelete') {
        autoDeleteEnabled = data.enabled;
        addSystemMsg(data.enabled ? '🔒 فعّل المنشئ ميزة حذف رسائلك تلقائياً.' : '🔓 ألغى المنشئ ميزة الحذف التلقائي.');
        return;
      }
      addMessage(data, 'peer');
    });
    conn.on('close', () => { if (!chatEnded) endChat('انقطع الاتصال.'); });
  }

  // ========== المنشئ ==========
  createRoomBtn.addEventListener('click', () => {
    const duration = parseInt(durationSelect.value);
    autoDeleteEnabled = autoDeleteCheckbox.checked;
    roomId = generateRoomId(duration);
    isInitiator = true;
    startChat();
  });

  function startChat() {
    setupScreen.style.display = 'none';
    chatScreen.style.display = 'flex';
    updateStatus('⏳ في انتظار انضمام الطرف الآخر...');
    const newUrl = window.location.origin + window.location.pathname + '?room=' + roomId;
    window.history.replaceState({}, '', newUrl);
    expiryTime = parseExpiry(roomId);

    // المنشئ يستخدم roomId كمعرف (نفس المنطق القديم)
    peer = new Peer(roomId, PEER_CONFIG);

    peer.on('connection', (incoming) => {
      setupConnection(incoming);
      if (incoming.open) incoming.emit('open');
    });

    peer.on('error', (err) => console.error('خطأ:', err));
  }

  // ========== المنضم (نفس منطق الكود القديم الناجح) ==========
  const urlParams = new URLSearchParams(window.location.search);
  const roomFromUrl = urlParams.get('room');

  if (roomFromUrl) {
    roomId = roomFromUrl;
    expiryTime = parseExpiry(roomId);

    if (!expiryTime || Date.now() >= expiryTime) {
      alert('⛔ انتهت صلاحية هذه الغرفة.');
      throw new Error('Expired');
    }

    isInitiator = false;
    setupScreen.style.display = 'none';
    chatScreen.style.display = 'flex';
    updateStatus('⏳ جاري الاتصال بالغرفة...');
    addSystemMsg('🔄 جاري الاتصال...');

    // ====== هذا هو المفتاح: نستخدم نفس roomId كمعرف للمنضم أيضاً ======
    // نضيف بادئة "joiner-" لتجنب التعارض التقني
    const joinerId = 'joiner-' + roomId;
    peer = new Peer(joinerId, PEER_CONFIG);

    peer.on('open', () => {
      // الآن كلا الطرفين مسجلان على الخادم بمعرفين مشتقين من roomId
      conn = peer.connect(roomId, { reliable: true });
      setupConnection(conn);
    });

    peer.on('error', (err) => {
      console.error('خطأ:', err);
      updateStatus('❌ فشل الاتصال. تأكد أن المنشئ فاتح الصفحة.');
    });
  } else {
    setupScreen.style.display = 'flex';
  }

  // ========== أزرار ==========
  copyLinkBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(window.location.href).then(() => alert('✅ تم نسخ الرابط!'));
  });
  qrBtn.addEventListener('click', () => {
    qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.location.href)}`;
    qrModal.style.display = 'flex';
  });
  closeQrBtn.addEventListener('click', () => qrModal.style.display = 'none');
  endChatBtn.addEventListener('click', () => {
    if (confirm('إنهاء المحادثة؟')) endChat('✖️ تم إنهاء المحادثة.');
  });

  sendBtn.addEventListener('click', () => {
    const msg = inputMsg.value.trim();
    if (!msg || !conn || !conn.open || chatEnded) return;
    addMessage(msg, 'me');
    conn.send(msg);
    inputMsg.value = '';
    conn.send({ type: 'typing', isTyping: false });
  });
  let typingTimeout;
  inputMsg.addEventListener('input', () => {
    if (!conn || !conn.open || chatEnded) return;
    conn.send({ type: 'typing', isTyping: true });
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => conn.send({ type: 'typing', isTyping: false }), 1200);
  });
  inputMsg.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });
  window.addEventListener('beforeunload', () => {
    if (conn && conn.open) conn.send({ type: 'end', reason: 'غادر المستخدم.' });
  });
</script>
</body>
</html>
