<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محادثة خاصة مؤقتة</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5; color: #1c1e21;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 10px;
    }
    .container {
      width: 100%; max-width: 500px; background: #fff;
      border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      overflow: hidden; display: flex; flex-direction: column;
      height: 90vh; max-height: 750px;
    }
    /* رأس الصفحة */
    .header {
      background: #4a6fa5; color: #fff; padding: 15px;
      text-align: center; font-weight: bold; font-size: 1.2em;
    }
    .room-info {
      background: #e9edf4; padding: 10px;
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 10px; align-items: center; font-size: 0.9em;
    }
    .timer { font-weight: bold; color: #d32f2f; }
    .controls {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    }
    .btn {
      background: #fff; border: 1px solid #ccc; border-radius: 25px;
      padding: 10px 15px; font-size: 0.9em; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      transition: all 0.2s; background: #f8fafd; white-space: nowrap;
    }
    .btn:active { transform: scale(0.96); }
    .btn.primary { background: #4a6fa5; color: #fff; border: none; }
    .btn.danger { background: #d32f2f; color: #fff; border: none; }

    /* منطقة الرسائل */
    .messages {
      flex: 1; overflow-y: auto; padding: 15px;
      display: flex; flex-direction: column; gap: 8px;
      background: #fafbfc;
    }
    .msg {
      max-width: 80%; padding: 10px 14px; border-radius: 18px;
      line-height: 1.4; word-wrap: break-word;
    }
    .me {
      align-self: flex-end; background: #4a6fa5; color: #fff;
      border-bottom-left-radius: 4px;
    }
    .peer {
      align-self: flex-start; background: #e4e6eb; color: #1c1e21;
      border-bottom-right-radius: 4px;
    }
    .typing-indicator {
      font-size: 0.8em; color: #666; padding: 5px 15px;
      min-height: 24px; font-style: italic;
    }

    /* صندوق الكتابة */
    .input-area {
      display: flex; padding: 10px; gap: 8px;
      background: #fff; border-top: 1px solid #ddd;
      align-items: center;
    }
    .input-area input {
      flex: 1; padding: 12px 15px; border: 1px solid #ccc;
      border-radius: 30px; font-size: 1em; outline: none;
    }
    .input-area button {
      background: #4a6fa5; color: #fff; border: none;
      border-radius: 50%; width: 45px; height: 45px;
      font-size: 1.2em; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: 0.2s;
    }
    .input-area button:disabled { background: #b0bec5; }

    /* Modal لـ QR */
    .modal {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.5);
      justify-content: center; align-items: center; z-index: 10;
    }
    .modal-content {
      background: #fff; padding: 20px; border-radius: 20px;
      text-align: center; max-width: 90%;
    }
    .close-btn {
      background: #ccc; border: none; border-radius: 50%;
      width: 30px; height: 30px; cursor: pointer;
    }

    /* إعدادات المدة (للمنشئ فقط) */
    .setup-duration {
      display: none; flex-direction: column; gap: 10px; padding: 15px;
    }
    .setup-duration select {
      padding: 10px; border-radius: 10px; border: 1px solid #ccc;
    }

    @media (max-width: 400px) {
      .btn { padding: 8px 10px; font-size: 0.8em; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">💬 محادثة مؤقتة آمنة</div>

  <!-- شاشة اختيار المدة (للمنشئ) -->
  <div id="setupScreen" class="setup-duration">
    <p>⏱️ اختر مدة صلاحية الغرفة:</p>
    <select id="durationSelect">
      <option value="5">5 دقائق (للمشاركة السريعة)</option>
      <option value="30">30 دقيقة</option>
      <option value="60" selected>1 ساعة</option>
      <option value="360">6 ساعات</option>
      <option value="1440">24 ساعة (يوم)</option>
      <option value="10080">7 أيام (أسبوع)</option>
    </select>
    <button class="btn primary" id="createRoomBtn">✨ إنشاء الغرفة</button>
  </div>

  <!-- الشاشة الرئيسية (تظهر بعد إنشاء/انضمام) -->
  <div id="chatScreen" style="display: none; flex:1; flex-direction: column;">
    <div class="room-info">
      <span>🕒 <span class="timer" id="timerDisplay">--:--:--</span></span>
      <span>🆔 <span id="roomIdDisplay"></span></span>
      <div class="controls">
        <button class="btn" id="copyLinkBtn" title="نسخ الرابط">📋 نسخ</button>
        <button class="btn" id="qrBtn" title="عرض QR">📷 QR</button>
        <button class="btn" id="whatsappBtn" title="مشاركة واتساب">📤 واتساب</button>
        <button class="btn danger" id="endChatBtn" title="إنهاء المحادثة">✖️ إنهاء</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="input-area">
      <input type="text" id="inputMsg" placeholder="اكتب رسالتك..." disabled />
      <button id="sendBtn" disabled>➤</button>
    </div>
  </div>
</div>

<!-- مودال QR -->
<div class="modal" id="qrModal">
  <div class="modal-content">
    <h3>📱 امسح الكود للانضمام</h3>
    <img id="qrImage" src="" alt="QR Code" style="max-width:200px; margin:15px;">
    <br><button class="close-btn" id="closeQrBtn">✖</button>
  </div>
</div>

<!-- صوت تنبيه خفيف (اختياري) -->
<audio id="newMsgSound" src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" preload="auto"></audio>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
  (function() {
    // ---------- عناصر ----------
    const setupScreen = document.getElementById('setupScreen');
    const chatScreen = document.getElementById('chatScreen');
    const durationSelect = document.getElementById('durationSelect');
    const createRoomBtn = document.getElementById('createRoomBtn');
    const timerDisplay = document.getElementById('timerDisplay');
    const roomIdDisplay = document.getElementById('roomIdDisplay');
    const messagesDiv = document.getElementById('messages');
    const typingIndicator = document.getElementById('typingIndicator');
    const inputMsg = document.getElementById('inputMsg');
    const sendBtn = document.getElementById('sendBtn');
    const copyLinkBtn = document.getElementById('copyLinkBtn');
    const qrBtn = document.getElementById('qrBtn');
    const whatsappBtn = document.getElementById('whatsappBtn');
    const endChatBtn = document.getElementById('endChatBtn');
    const qrModal = document.getElementById('qrModal');
    const qrImage = document.getElementById('qrImage');
    const closeQrBtn = document.getElementById('closeQrBtn');
    const newMsgSound = document.getElementById('newMsgSound');

    // ---------- متغيرات ----------
    let peer, conn;
    let roomId, expiryTime; // expiryTime = timestamp milliseconds
    let timerInterval;
    let isInitiator = false;
    let chatEnded = false;

    // ---------- دوال مساعدة ----------
    function generateRoomId(durationMinutes) {
      const now = Date.now();
      expiryTime = now + durationMinutes * 60 * 1000;
      const expiryDate = new Date(expiryTime);
      // صيغة: temp-chat-YYYY-MM-DDTHH:mm-xxxxxx
      const pad = (n) => String(n).padStart(2,'0');
      const dateStr = `${expiryDate.getFullYear()}-${pad(expiryDate.getMonth()+1)}-${pad(expiryDate.getDate())}T${pad(expiryDate.getHours())}:${pad(expiryDate.getMinutes())}`;
      const randomPart = Math.random().toString(36).substring(2, 8);
      return `temp-chat-${dateStr}-${randomPart}`;
    }

    function parseExpiryFromRoomId(roomId) {
      const prefix = 'temp-chat-';
      if (!roomId.startsWith(prefix)) return null;
      const after = roomId.substring(prefix.length);
      const dateTimePart = after.substring(0, 16); // YYYY-MM-DDTHH:mm
      const date = new Date(dateTimePart);
      return date.getTime();
    }

    function updateTimer() {
      if (!expiryTime) return;
      const now = Date.now();
      const diff = expiryTime - now;
      if (diff <= 0) {
        timerDisplay.textContent = 'انتهت الصلاحية';
        endChat('انتهت صلاحية الغرفة تلقائياً.');
        return;
      }
      const sec = Math.floor(diff / 1000);
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      timerDisplay.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function addMessage(text, sender) {
      if (chatEnded) return;
      const div = document.createElement('div');
      div.className = 'msg ' + sender;
      div.textContent = (sender === 'me' ? 'أنت: ' : 'الطرف الآخر: ') + text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      // صوت تنبيه للرسائل الواردة فقط
      if (sender === 'peer') {
        newMsgSound.play().catch(()=>{});
      }
    }

    function endChat(reason = 'تم إنهاء المحادثة.') {
      if (chatEnded) return;
      chatEnded = true;
      // إرسال إشارة نهاية للطرف الآخر
      if (conn && conn.open) {
        conn.send({ type: 'end', reason });
      }
      // قطع الاتصال
      if (conn) conn.close();
      if (peer) peer.destroy();
      // عرض رسالة
      addMessage(reason, 'system'); // نستخدم system (سنضيف تنسيق)
      inputMsg.disabled = true;
      sendBtn.disabled = true;
      clearInterval(timerInterval);
      timerDisplay.textContent = 'انتهت';
      // يمكن إضافة رسالة في الأعلى
    }

    // ---------- تهيئة الاتصال ----------
    function setupConnection(connection) {
      conn = connection;
      conn.on('data', (data) => {
        if (data.type === 'end') {
          endChat(data.reason || 'أنهى الطرف الآخر المحادثة.');
          return;
        }
        if (data.type === 'typing') {
          typingIndicator.textContent = data.isTyping ? '✍️ الطرف الآخر يكتب...' : '';
          return;
        }
        // رسالة نصية عادية
        addMessage(data, 'peer');
      });
      conn.on('close', () => {
        if (!chatEnded) endChat('انقطع الاتصال.');
      });
      conn.on('error', () => {
        if (!chatEnded) endChat('حدث خطأ في الاتصال.');
      });
    }

    function onConnectionOpen() {
      if (chatEnded) return;
      document.getElementById('statusText')?.remove();
      inputMsg.disabled = false;
      sendBtn.disabled = false;
      // عرض مؤقت
      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
    }

    // ---------- إنشاء الغرفة (للمنشئ) ----------
    createRoomBtn.addEventListener('click', () => {
      const duration = parseInt(durationSelect.value);
      roomId = generateRoomId(duration);
      isInitiator = true;
      startChat();
    });

    function startChat() {
      setupScreen.style.display = 'none';
      chatScreen.style.display = 'flex';
      roomIdDisplay.textContent = roomId;

      // تحديث الرابط في المتصفح
      const newUrl = window.location.origin + window.location.pathname + '?room=' + roomId;
      window.history.replaceState({}, '', newUrl);

      // إنشاء Peer
      peer = new Peer(roomId); // المنشئ يستخدم roomId كمعرف

      peer.on('connection', (incomingConn) => {
        setupConnection(incomingConn);
        incomingConn.on('open', () => onConnectionOpen());
        if (incomingConn.open) onConnectionOpen();
      });

      peer.on('error', (err) => console.error);

      // بدء العداد
      expiryTime = parseExpiryFromRoomId(roomId);
      timerInterval = setInterval(updateTimer, 1000);
      updateTimer();
    }

    // ---------- الانضمام كطرف ثاني ----------
    const urlParams = new URLSearchParams(window.location.search);
    const roomFromUrl = urlParams.get('room');
    if (roomFromUrl) {
      roomId = roomFromUrl;
      expiryTime = parseExpiryFromRoomId(roomId);
      if (!expiryTime || Date.now() >= expiryTime) {
        alert('انتهت صلاحية الغرفة أو الرابط غير صحيح.');
        throw new Error('Expired');
      }
      isInitiator = false;
      startChatAsJoiner();
    } else {
      // لا يوجد ?room، نظهر شاشة اختيار المدة للمنشئ
      setupScreen.style.display = 'flex';
    }

    function startChatAsJoiner() {
      setupScreen.style.display = 'none';
      chatScreen.style.display = 'flex';
      roomIdDisplay.textContent = roomId;

      const newUrl = window.location.origin + window.location.pathname + '?room=' + roomId;
      window.history.replaceState({}, '', newUrl);

      peer = new Peer(); // معرف عشوائي للانضمام

      peer.on('open', (myId) => {
        conn = peer.connect(roomId, { reliable: true });
        setupConnection(conn);
        conn.on('open', () => onConnectionOpen());
      });

      peer.on('error', (err) => {
        if (err.type === 'peer-unavailable') {
          endChat('الطرف الآخر غير متاح حالياً.');
        }
      });

      expiryTime = parseExpiryFromRoomId(roomId);
      timerInterval = setInterval(updateTimer, 1000);
      updateTimer();
    }

    // ---------- أزرار التحكم ----------
    copyLinkBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(window.location.href).then(() => {
        alert('✅ تم نسخ الرابط!');
      });
    });

    qrBtn.addEventListener('click', () => {
      const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.location.href)}`;
      qrImage.src = qrApi;
      qrModal.style.display = 'flex';
    });

    closeQrBtn.addEventListener('click', () => {
      qrModal.style.display = 'none';
    });

    whatsappBtn.addEventListener('click', () => {
      const text = encodeURIComponent('انضم للمحادثة الآمنة المؤقتة: ' + window.location.href);
      window.open(`https://wa.me/?text=${text}`, '_blank');
    });

    endChatBtn.addEventListener('click', () => {
      if (confirm('هل تريد إنهاء المحادثة؟')) {
        endChat('تم إنهاء المحادثة من قِبلك.');
      }
    });

    // ---------- الكتابة وإرسال الرسائل ----------
    sendBtn.addEventListener('click', () => {
      const msg = inputMsg.value.trim();
      if (!msg || !conn || !conn.open || chatEnded) return;
      addMessage(msg, 'me');
      conn.send(msg);
      inputMsg.value = '';
      // إيقاف مؤشر الكتابة
      conn.send({ type: 'typing', isTyping: false });
    });

    let typingTimeout;
    inputMsg.addEventListener('input', () => {
      if (!conn || !conn.open || chatEnded) return;
      conn.send({ type: 'typing', isTyping: true });
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        conn.send({ type: 'typing', isTyping: false });
      }, 1000);
    });

    inputMsg.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendBtn.click();
    });

    // ---------- معالجة الإغلاق ----------
    window.addEventListener('beforeunload', () => {
      if (conn && conn.open) {
        conn.send({ type: 'end', reason: 'غادر المستخدم الصفحة.' });
      }
    });

  })();
</script>
</body>
</html>
