<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>محادثة مؤقتة بين اثنين - نسخة تعمل</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 30px auto; padding: 0 15px; }
    #messages { height: 300px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #fafafa; }
    .msg { margin: 5px 0; }
    .me { color: blue; }
    .peer { color: green; }
    #roomId { font-weight: bold; background: #eee; padding: 4px 8px; border-radius: 4px; }
    input, button { font-size: 16px; padding: 8px; }
    #status { color: red; margin: 10px 0; }
    #expiryNote { font-size: 0.9em; color: #555; margin-top: 15px; }
  </style>
</head>
<body>
  <h2>💬 محادثة مؤقتة بين اثنين (لا تخزين)</h2>
  <p>معرّف الغرفة: <span id="roomId"></span></p>
  <p id="status">⏳ في انتظار اتصال الطرف الآخر...</p>
  <div id="messages"></div>
  <input type="text" id="inputMsg" placeholder="اكتب رسالتك..." disabled />
  <button id="sendBtn" disabled>إرسال</button>
  <p id="expiryNote">⚠️ هذه الغرفة تنتهي صلاحيتها بعد أسبوع من إنشائها.</p>

  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
  <script>
    const EXPIRY_DAYS = 7;
    const ROOM_PREFIX = "temp-chat-";

    // --- دوال مساعدة لتوليد والتحقق من صلاحية الغرفة ---
    function generateRoomId() {
      const now = new Date();
      const expiryDate = new Date(now.getTime() + EXPIRY_DAYS * 24 * 60 * 60 * 1000);
      const expiryStr = expiryDate.toISOString().split('T')[0];
      const randomPart = Math.random().toString(36).substring(2, 8);
      return `${ROOM_PREFIX}${expiryStr}-${randomPart}`;
    }

    function isRoomValid(roomId) {
      if (!roomId || !roomId.startsWith(ROOM_PREFIX)) return false;
      const dateStr = roomId.substring(ROOM_PREFIX.length, ROOM_PREFIX.length + 10);
      const expiryDate = new Date(dateStr);
      return new Date() <= expiryDate;
    }

    // --- تحديد إذا كنا منشئ الغرفة أم منضم ---
    const urlParams = new URLSearchParams(window.location.search);
    const roomFromUrl = urlParams.get('room');
    let roomId;
    let isInitiator = false; // true = المنشئ، false = المنضم

    if (!roomFromUrl) {
      // لا يوجد ?room في الرابط -> نحن المنشئ
      isInitiator = true;
      roomId = generateRoomId();
      // تحديث الرابط لإظهار المعرّف
      const newUrl = window.location.origin + window.location.pathname + '?room=' + roomId;
      window.history.replaceState({}, '', newUrl);
    } else {
      // يوجد ?room -> نحن المنضم
      roomId = roomFromUrl;
      if (!isRoomValid(roomId)) {
        document.getElementById('status').innerText = '⚠️ انتهت صلاحية هذه الغرفة.';
        document.getElementById('expiryNote').innerText = '';
        throw new Error('Room expired');
      }
    }

    document.getElementById('roomId').innerText = roomId;

    // --- عناصر الواجهة ---
    const messagesDiv = document.getElementById('messages');
    const inputMsg = document.getElementById('inputMsg');
    const sendBtn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');

    // --- إنشاء Peer ---
    // المنشئ: يستخدم roomId كمعرّف له (حتى يتمكن المنضم من الاتصال به)
    // المنضم: يترك PeerJS يولد معرّفاً عشوائياً (فريداً)
    const peer = isInitiator ? new Peer(roomId) : new Peer();
    let conn = null;

    // --- دالة إضافة رسالة للشاشة ---
    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = 'msg ' + (sender === 'me' ? 'me' : 'peer');
      div.textContent = (sender === 'me' ? 'أنت: ' : 'الطرف الآخر: ') + text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // --- إعداد الاتصال بعد إنشائه ---
    function setupConnection(connection) {
      conn = connection;
      conn.on('data', (data) => {
        addMessage(data, 'peer');
      });
      conn.on('close', () => {
        statusEl.innerText = '❌ انقطع الاتصال.';
        inputMsg.disabled = true;
        sendBtn.disabled = true;
        conn = null;
      });
      conn.on('error', (err) => {
        console.error(err);
        statusEl.innerText = 'حدث خطأ في الاتصال.';
      });
    }

    // --- عند فتح الاتصال (أي يصبح جاهزاً) ---
    function onConnectionOpen() {
      statusEl.innerText = '✅ تم الاتصال! يمكنكما التحدث الآن.';
      inputMsg.disabled = false;
      sendBtn.disabled = false;
    }

    // --- المنشئ: يستمع للاتصالات الواردة ---
    if (isInitiator) {
      peer.on('connection', (incomingConn) => {
        setupConnection(incomingConn);
        // الاتصال قد يكون مفتوحاً بعد قليل أو فوراً
        incomingConn.on('open', () => {
          onConnectionOpen();
        });
        if (incomingConn.open) {
          onConnectionOpen();
        }
      });
    }

    // --- المنضم: يبدأ الاتصال بالمنشئ بعد أن يصبح الـ Peer جاهزاً ---
    if (!isInitiator) {
      peer.on('open', (myId) => {
        console.log('معرفي العشوائي:', myId);
        // نتصل بمعرف الغرفة (الذي هو معرف المنشئ)
        const connection = peer.connect(roomId, { reliable: true });
        setupConnection(connection);
        connection.on('open', () => {
          onConnectionOpen();
        });
      });
    }

    // --- أزرار الإرسال ---
    sendBtn.addEventListener('click', () => {
      const msg = inputMsg.value.trim();
      if (!msg || !conn || !conn.open) return;
      addMessage(msg, 'me');
      conn.send(msg);
      inputMsg.value = '';
    });

    inputMsg.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendBtn.click();
    });

    // معالجة أي أخطاء من peer
    peer.on('error', (err) => {
      console.error('Peer error:', err);
      if (err.type === 'peer-unavailable') {
        statusEl.innerText = '❌ لا يمكن الوصول إلى الطرف الآخر. تأكد أن الرابط صحيح والطرف الآخر فتحه.';
      } else {
        statusEl.innerText = '⚠️ خطأ: ' + err.message;
      }
    });
  </script>
</body>
</html>
