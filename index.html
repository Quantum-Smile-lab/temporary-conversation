<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محادثة مؤقتة بين اثنين</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #e8ded2; display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 8px;
    }
    .container {
      width: 100%; max-width: 480px; background: #fff;
      border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      overflow: hidden; display: flex; flex-direction: column;
      height: 92vh; max-height: 780px;
    }
    .header {
      background: #075e54; color: #fff; padding: 12px 15px;
      text-align: center; font-weight: bold; font-size: 1.1em;
    }
    .status-bar {
      background: #fff; padding: 8px 12px; font-size: 0.8em;
      text-align: center; border-bottom: 1px solid #ddd;
      color: #555; min-height: 30px; display: flex;
      align-items: center; justify-content: center; gap: 8px;
      flex-wrap: wrap;
    }
    .timer { font-weight: bold; color: #c0392b; background: #fdecea; padding: 2px 10px; border-radius: 12px; }
    .controls { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
    .btn {
      background: #fff; border: 1px solid #ccc; border-radius: 20px;
      padding: 6px 12px; font-size: 0.8em; cursor: pointer;
      transition: 0.2s; white-space: nowrap;
    }
    .btn:active { transform: scale(0.95); }
    .btn.danger { background: #e74c3c; color: #fff; border: none; }

    .messages {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 4px;
      background: #efeae2;
    }
    .msg {
      max-width: 85%; padding: 8px 12px; border-radius: 8px;
      line-height: 1.4; word-wrap: break-word;
    }
    .me {
      align-self: flex-end; background: #d9fdd3;
      margin-left: 20%; border-top-right-radius: 0;
    }
    .peer {
      align-self: flex-start; background: #fff;
      margin-right: 20%; border-top-left-radius: 0;
    }
    .system-msg {
      align-self: center; background: #e1f3fb; color: #1a6d8a;
      font-size: 0.8em; padding: 4px 12px; border-radius: 8px;
      max-width: 90%; text-align: center;
    }
    .typing-indicator {
      font-size: 0.75em; color: #888; padding: 0 15px 4px;
      min-height: 20px; font-style: italic;
    }
    .input-area {
      display: flex; padding: 8px; gap: 8px;
      background: #f0f0f0; border-top: 1px solid #ddd;
      align-items: center;
    }
    .input-area input {
      flex: 1; padding: 10px 14px; border: none; border-radius: 25px;
      font-size: 0.95em; outline: none; background: #fff;
    }
    .input-area button {
      background: #075e54; color: #fff; border: none;
      border-radius: 50%; width: 42px; height: 42px;
      font-size: 1.2em; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
    .input-area button:disabled { background: #b0bec5; }

    .setup-duration {
      display: flex; flex-direction: column; gap: 12px; padding: 20px; text-align: center;
    }
    .switch-label {
      display: flex; align-items: center; gap: 8px; font-size: 0.9em;
      justify-content: center; margin-top: 5px;
    }
    .modal {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.5);
      justify-content: center; align-items: center; z-index: 10;
    }
    .modal-content {
      background: #fff; padding: 20px; border-radius: 16px;
      text-align: center; max-width: 90%;
    }
    .close-btn {
      background: #ccc; border: none; border-radius: 50%;
      width: 30px; height: 30px; cursor: pointer; margin-top: 10px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">💬 محادثة آمنة مؤقتة</div>

  <!-- شاشة البداية للمنشئ: فقط اختيار الحذف التلقائي + زر إنشاء -->
  <div id="setupScreen" class="setup-duration">
    <p>⏱️ مدة الغرفة: <strong>6 ساعات</strong> (ثابتة)</p>
    <label class="switch-label">
      <input type="checkbox" id="autoDeleteCheckbox"> 🔒 حذف رسائل الطرف الآخر تلقائياً
    </label>
    <button class="btn" style="background:#075e54;color:#fff;padding:12px;font-size:1em;" id="createRoomBtn">✨ إنشاء الغرفة</button>
  </div>

  <!-- الشاشة الرئيسية -->
  <div id="chatScreen" style="display: none; flex:1; flex-direction: column;">
    <div class="status-bar">
      <span id="statusText">⏳ في انتظار اتصال الطرف الآخر...</span>
      <span class="timer" id="timerDisplay"></span>
      <div class="controls">
        <button class="btn" id="copyLinkBtn">📋 نسخ</button>
        <button class="btn" id="qrBtn">📷 QR</button>
        <button class="btn danger" id="endChatBtn">✖️ إنهاء</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="input-area">
      <input type="text" id="inputMsg" placeholder="اكتب رسالتك..." disabled />
      <button id="sendBtn" disabled>➤</button>
    </div>
  </div>
</div>

<div class="modal" id="qrModal">
  <div class="modal-content">
    <h3>📱 امسح الكود للانضمام</h3>
    <img id="qrImage" src="" alt="QR" style="max-width:200px; margin:10px;">
    <br><button class="close-btn" id="closeQrBtn">✖</button>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
  // =============================================
  // وقت ثابت 6 ساعات + نفس منطق الاتصال الأصلي
  // =============================================
  const ROOM_PREFIX = "temp-chat-";
  const FIXED_DURATION_HOURS = 6; // المدة الثابتة

  function generateRoomId() {
    const now = new Date();
    const expiryDate = new Date(now.getTime() + FIXED_DURATION_HOURS * 60 * 60 * 1000);
    // نستخدم صيغة UTC لتجنب مشاكل التوقيت المحلي
    const expiryStr = expiryDate.toISOString(); // YYYY-MM-DDTHH:mm:ss.sssZ
    const randomPart = Math.random().toString(36).substring(2, 8);
    return `${ROOM_PREFIX}${expiryStr}-${randomPart}`;
  }

  function getExpiryTimestamp(roomId) {
    if (!roomId || !roomId.startsWith(ROOM_PREFIX)) return null;
    const afterPrefix = roomId.substring(ROOM_PREFIX.length);
    // نستخرج التاريخ حتى Z أو الفاصلة
    const isoEndIndex = afterPrefix.indexOf('-') !== -1 ? afterPrefix.lastIndexOf('-') : afterPrefix.length;
    const isoString = afterPrefix.substring(0, isoEndIndex);
    try {
      const date = new Date(isoString);
      return date.getTime();
    } catch(e) {
      return null;
    }
  }

  function isRoomValid(roomId) {
    const expiryTime = getExpiryTimestamp(roomId);
    if (!expiryTime) return false;
    return Date.now() <= expiryTime;
  }

  // --- عناصر الواجهة ---
  const setupScreen = document.getElementById('setupScreen');
  const chatScreen = document.getElementById('chatScreen');
  const autoDeleteCheckbox = document.getElementById('autoDeleteCheckbox');
  const createRoomBtn = document.getElementById('createRoomBtn');
  const statusText = document.getElementById('statusText');
  const timerDisplay = document.getElementById('timerDisplay');
  const messagesDiv = document.getElementById('messages');
  const typingIndicator = document.getElementById('typingIndicator');
  const inputMsg = document.getElementById('inputMsg');
  const sendBtn = document.getElementById('sendBtn');
  const copyLinkBtn = document.getElementById('copyLinkBtn');
  const qrBtn = document.getElementById('qrBtn');
  const endChatBtn = document.getElementById('endChatBtn');
  const qrModal = document.getElementById('qrModal');
  const qrImage = document.getElementById('qrImage');
  const closeQrBtn = document.getElementById('closeQrBtn');

  let peer, conn;
  let roomId, expiryTime;
  let timerInterval;
  let isInitiator = false;
  let chatEnded = false;
  let autoDeleteEnabled = false;

  function addSystemMsg(text) {
    const div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function addMessage(text, sender) {
    if (chatEnded) return;
    if (sender === 'peer' && autoDeleteEnabled) {
      const old = messagesDiv.querySelectorAll('.msg.peer');
      old.forEach(el => el.remove());
    }
    const div = document.createElement('div');
    div.className = 'msg ' + (sender === 'me' ? 'me' : 'peer');
    div.textContent = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function updateTimer() {
    if (!expiryTime) return;
    const diff = expiryTime - Date.now();
    if (diff <= 0) { endChat('⏰ انتهت صلاحية الغرفة.'); return; }
    const sec = Math.floor(diff / 1000);
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
    timerDisplay.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  function endChat(reason) {
    if (chatEnded) return;
    chatEnded = true;
    statusText.textContent = reason;
    if (conn && conn.open) conn.send({ type: 'end', reason });
    if (conn) conn.close();
    if (peer) peer.destroy();
    inputMsg.disabled = true;
    sendBtn.disabled = true;
    clearInterval(timerInterval);
    addSystemMsg(reason);
  }

  // --- نفس إعداد الاتصال الأصلي ---
  function setupConnection(connection) {
    conn = connection;
    conn.on('data', (data) => {
      if (typeof data === 'object' && data !== null) {
        if (data.type === 'end') { endChat(data.reason); return; }
        if (data.type === 'typing') { typingIndicator.textContent = data.isTyping ? '✍️ الطرف الآخر يكتب...' : ''; return; }
        if (data.type === 'autoDelete') { autoDeleteEnabled = data.enabled; addSystemMsg(data.enabled ? '🔒 حذف تلقائي مفعّل' : '🔓 حذف تلقائي ملغى'); return; }
      }
      addMessage(data, 'peer');
    });
    conn.on('close', () => {
      statusText.textContent = '❌ انقطع الاتصال.';
      inputMsg.disabled = true;
      sendBtn.disabled = true;
      conn = null;
    });
    conn.on('error', (err) => {
      console.error(err);
      statusText.textContent = 'حدث خطأ في الاتصال.';
    });
  }

  function onConnectionOpen() {
    statusText.textContent = '✅ تم الاتصال! يمكنكما التحدث الآن.';
    inputMsg.disabled = false;
    sendBtn.disabled = false;
    addSystemMsg('✅ تم الاتصال.');
    updateTimer();
    clearInterval(timerInterval);
    timerInterval = setInterval(updateTimer, 1000);
    if (isInitiator && conn && conn.open) {
      conn.send({ type: 'autoDelete', enabled: autoDeleteEnabled });
    }
  }

  // --- تحديد منشئ أم منضم ---
  const urlParams = new URLSearchParams(window.location.search);
  const roomFromUrl = urlParams.get('room');

  if (roomFromUrl) {
    // منضم
    roomId = roomFromUrl;
    if (!isRoomValid(roomId)) {
      setupScreen.style.display = 'none';
      chatScreen.style.display = 'flex';
      statusText.textContent = '⚠️ انتهت صلاحية هذه الغرفة.';
      timerDisplay.textContent = 'منتهية';
      throw new Error('Room expired');
    }
    isInitiator = false;
    expiryTime = getExpiryTimestamp(roomId);
    setupScreen.style.display = 'none';
    chatScreen.style.display = 'flex';
    statusText.textContent = '⏳ في انتظار اتصال الطرف الآخر...';

    peer = new Peer();
    peer.on('open', (myId) => {
      console.log('معرفي:', myId);
      const connection = peer.connect(roomId, { reliable: true });
      setupConnection(connection);
      connection.on('open', () => onConnectionOpen());
    });
    peer.on('error', (err) => {
      console.error('Peer error:', err);
      if (err.type === 'peer-unavailable') {
        statusText.textContent = '❌ الطرف الآخر غير متاح.';
      }
    });
  } else {
    // منشئ - إظهار شاشة الإعداد
    setupScreen.style.display = 'flex';
  }

  // --- المنشئ: زر إنشاء الغرفة ---
  createRoomBtn.addEventListener('click', () => {
    autoDeleteEnabled = autoDeleteCheckbox.checked;
    isInitiator = true;
    roomId = generateRoomId();
    expiryTime = getExpiryTimestamp(roomId);

    setupScreen.style.display = 'none';
    chatScreen.style.display = 'flex';
    statusText.textContent = '⏳ في انتظار اتصال الطرف الآخر...';

    const newUrl = window.location.origin + window.location.pathname + '?room=' + roomId;
    window.history.replaceState({}, '', newUrl);

    peer = new Peer(roomId);
    peer.on('connection', (incomingConn) => {
      setupConnection(incomingConn);
      incomingConn.on('open', () => onConnectionOpen());
      if (incomingConn.open) onConnectionOpen();
    });
    peer.on('error', (err) => console.error('Peer error:', err));
  });

  // --- أزرار ---
  copyLinkBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(window.location.href).then(() => alert('✅ تم النسخ!'));
  });
  qrBtn.addEventListener('click', () => {
    qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.location.href)}`;
    qrModal.style.display = 'flex';
  });
  closeQrBtn.addEventListener('click', () => qrModal.style.display = 'none');
  endChatBtn.addEventListener('click', () => {
    if (confirm('إنهاء المحادثة؟')) endChat('✖️ تم إنهاء المحادثة.');
  });

  sendBtn.addEventListener('click', () => {
    const msg = inputMsg.value.trim();
    if (!msg || !conn || !conn.open || chatEnded) return;
    addMessage(msg, 'me');
    conn.send(msg);
    inputMsg.value = '';
    conn.send({ type: 'typing', isTyping: false });
  });
  let typingTimeout;
  inputMsg.addEventListener('input', () => {
    if (!conn || !conn.open || chatEnded) return;
    conn.send({ type: 'typing', isTyping: true });
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => { if (conn && conn.open) conn.send({ type: 'typing', isTyping: false }); }, 1200);
  });
  inputMsg.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });
  window.addEventListener('beforeunload', () => {
    if (conn && conn.open) conn.send({ type: 'end', reason: 'غادر المستخدم.' });
  });
</script>
</body>
</html>
