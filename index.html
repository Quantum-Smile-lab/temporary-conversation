<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>محادثة مؤقتة بين اثنين</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #e8ded2;
      display: flex;
      justify-content: center;
      align-items: center;
      /* لا يوجد padding هنا، نضعه داخل container */
    }

    .container {
      width: 100%;
      max-width: 480px;
      height: 100%; /* سيملأ الشاشة بالكامل بدون تجاوز */
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      margin: 0 8px; /* هامش صغير بدلاً من padding في body */
    }

    .header {
      background: #075e54;
      color: #fff;
      padding: 12px 15px;
      text-align: center;
      font-weight: bold;
      font-size: 1.1em;
      flex-shrink: 0;
    }

    .status-bar {
      background: #fff;
      padding: 8px 12px;
      font-size: 0.8em;
      text-align: center;
      border-bottom: 1px solid #ddd;
      color: #555;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .timer {
      font-weight: bold;
      color: #c0392b;
      background: #fdecea;
      padding: 2px 10px;
      border-radius: 12px;
    }

    .controls {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 0.8em;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.95); }
    .btn.danger { background: #e74c3c; color: #fff; border: none; }

    .messages {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: #efeae2;
      min-height: 0; /* ضروري لمنع تمدد غير محدود */
    }

    .msg {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 8px;
      line-height: 1.4;
      word-wrap: break-word;
      transition: all 0.3s;
    }

    .me {
      align-self: flex-end;
      background: #d9fdd3;
      margin-left: 20%;
      border-top-right-radius: 0;
    }

    .peer {
      align-self: flex-start;
      background: #fff;
      margin-right: 20%;
      border-top-left-radius: 0;
    }

    .masked {
      background: #ddd;
      color: #999;
      font-style: italic;
      letter-spacing: 2px;
    }

    .system-msg {
      align-self: center;
      background: #e1f3fb;
      color: #1a6d8a;
      font-size: 0.8em;
      padding: 4px 12px;
      border-radius: 8px;
      max-width: 90%;
      text-align: center;
    }

    .typing-indicator {
      font-size: 0.75em;
      color: #888;
      padding: 0 15px 4px;
      min-height: 20px;
      font-style: italic;
      flex-shrink: 0;
    }

    .input-area {
      display: flex;
      padding: 8px;
      gap: 8px;
      background: #f0f0f0;
      border-top: 1px solid #ddd;
      align-items: center;
      flex-shrink: 0;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 25px;
      font-size: 0.95em;
      outline: none;
      background: #fff;
    }

    .input-area button {
      background: #075e54;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 1.2em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .input-area button:disabled { background: #b0bec5; }

    .setup-duration {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px;
      text-align: center;
      overflow-y: auto;
      flex: 1;
    }

    .setup-duration select {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 1em;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .modal-content {
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      text-align: center;
      max-width: 90%;
    }

    .close-btn {
      background: #ccc;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
      margin-top: 10px;
    }

    .advanced-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #f9f9f9;
      border-radius: 12px;
      padding: 15px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">💬 محادثة آمنة مؤقتة</div>

  <div id="setupScreen" class="setup-duration">
    <p>⏱️ اختر المدة:</p>
    <select id="durationSelect">
      <optgroup label="بالأيام">
        <option value="0d">ينتهي آخر اليوم</option>
        <option value="1d">1 يوم</option>
        <option value="2d">2 يوم</option>
        <option value="3d">3 أيام</option>
        <option value="4d">4 أيام</option>
        <option value="5d">5 أيام</option>
        <option value="6d">6 أيام</option>
        <option value="7d" selected>7 أيام</option>
      </optgroup>
      <optgroup label="بالساعات">
        <option value="1h">1 ساعة</option>
        <option value="2h">2 ساعة</option>
        <option value="3h">3 ساعة</option>
        <option value="6h">6 ساعة</option>
        <option value="12h">12 ساعة</option>
        <option value="24h">24 ساعة</option>
      </optgroup>
    </select>

    <div class="advanced-options">
      <label>🔒 عدد الرسائل الظاهرة قبل أن تتحول إلى نجوم:</label>
      <select id="visibleCountSelect">
        <option value="1">1 رسالة (الخصوصية القصوى)</option>
        <option value="2">2 رسالتين</option>
        <option value="3" selected>3 رسائل</option>
        <option value="5">5 رسائل</option>
        <option value="0">الكل (بدون إخفاء)</option>
      </select>
      <small style="color:#666">عند إرسال رسالة جديدة، كل الرسائل السابقة لنفس المرسل تصبح **** ما عدا هذا العدد.</small>
    </div>

    <button class="btn" style="background:#075e54;color:#fff;padding:12px;font-size:1em;" id="createRoomBtn">✨ إنشاء الغرفة</button>
  </div>

  <div id="chatScreen" style="display: none; flex:1; flex-direction: column;">
    <div class="status-bar">
      <span id="statusText">⏳ في انتظار اتصال الطرف الآخر...</span>
      <span class="timer" id="timerDisplay"></span>
      <div class="controls">
        <button class="btn" id="copyLinkBtn">📋 نسخ</button>
        <button class="btn" id="qrBtn">📷 QR</button>
        <button class="btn danger" id="endChatBtn">✖️ إنهاء</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="input-area">
      <input type="text" id="inputMsg" placeholder="اكتب رسالتك..." disabled />
      <button id="sendBtn" disabled>➤</button>
    </div>
  </div>
</div>

<!-- Modal QR -->
<div class="modal" id="qrModal">
  <div class="modal-content">
    <h3>📱 امسح الكود للانضمام</h3>
    <img id="qrImage" src="" alt="QR" style="max-width:200px; margin:10px;">
    <br><button class="close-btn" id="closeQrBtn">✖</button>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
  // ... الجزء الخاص بالـ JavaScript كما هو تماماً من الكود السابق ...
  // (لم يتم تغيير أي شيء في الوظائف، فقط CSS)
  const ROOM_PREFIX = "temp-chat-";

  function generateRoomId() {
    const now = new Date();
    const dateStr = now.toISOString().split('T')[0];
    const randomPart = Math.random().toString(36).substring(2, 8);
    return `${ROOM_PREFIX}${dateStr}-${randomPart}`;
  }

  function parseDuration(durationStr) {
    const num = parseInt(durationStr);
    if (durationStr.endsWith('d')) return num * 24 * 60 * 60 * 1000;
    if (durationStr.endsWith('h')) return num * 60 * 60 * 1000;
    return 0;
  }

  const setupScreen = document.getElementById('setupScreen');
  const chatScreen = document.getElementById('chatScreen');
  const durationSelect = document.getElementById('durationSelect');
  const visibleCountSelect = document.getElementById('visibleCountSelect');
  const createRoomBtn = document.getElementById('createRoomBtn');
  const statusEl = document.getElementById('statusText');
  const timerDisplay = document.getElementById('timerDisplay');
  const messagesDiv = document.getElementById('messages');
  const typingIndicator = document.getElementById('typingIndicator');
  const inputMsg = document.getElementById('inputMsg');
  const sendBtn = document.getElementById('sendBtn');
  const copyLinkBtn = document.getElementById('copyLinkBtn');
  const qrBtn = document.getElementById('qrBtn');
  const endChatBtn = document.getElementById('endChatBtn');
  const qrModal = document.getElementById('qrModal');
  const qrImage = document.getElementById('qrImage');
  const closeQrBtn = document.getElementById('closeQrBtn');

  let peer, conn;
  let roomId, expiryTime;
  let timerInterval;
  let isInitiator = false;
  let chatEnded = false;
  let visibleCount = 3;

  function addSystemMsg(text) {
    const div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function maskOldMessages(sender) {
    if (visibleCount === 0) return;
    const selector = sender === 'me' ? '.msg.me' : '.msg.peer';
    const msgs = Array.from(messagesDiv.querySelectorAll(selector));
    const keep = visibleCount;
    for (let i = 0; i < msgs.length - keep; i++) {
      const el = msgs[i];
      if (!el.classList.contains('masked')) {
        el.dataset.originalText = el.textContent;
        el.textContent = '****';
        el.classList.add('masked');
      }
    }
  }

  function addMessage(text, sender) {
    if (chatEnded) return;
    maskOldMessages(sender);
    const div = document.createElement('div');
    div.className = 'msg ' + (sender === 'me' ? 'me' : 'peer');
    div.textContent = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function updateTimer() {
    if (!expiryTime) return;
    const diff = expiryTime - Date.now();
    if (diff <= 0) { endChat('⏰ انتهت صلاحية الغرفة.'); return; }
    const sec = Math.floor(diff / 1000);
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
    timerDisplay.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  function endChat(reason) {
    if (chatEnded) return;
    chatEnded = true;
    statusEl.textContent = reason;
    if (conn && conn.open) conn.send({ type: 'end', reason });
    if (conn) conn.close();
    if (peer) peer.destroy();
    inputMsg.disabled = true;
    sendBtn.disabled = true;
    clearInterval(timerInterval);
    addSystemMsg(reason);
  }

  function setupConnection(connection) {
    conn = connection;
    conn.on('data', (data) => {
      if (typeof data === 'object' && data !== null) {
        if (data.type === 'end') { endChat(data.reason); return; }
        if (data.type === 'typing') { typingIndicator.textContent = data.isTyping ? '✍️ الطرف الآخر يكتب...' : ''; return; }
        if (data.type === 'visibilityConfig') {
          visibleCount = data.visibleCount;
          addSystemMsg(`🔒 عدد الرسائل الظاهرة: ${visibleCount === 0 ? 'الكل' : visibleCount}`);
          return;
        }
        if (data.type === 'requestExpiry' && isInitiator && expiryTime) {
          conn.send({ type: 'expiryTime', time: expiryTime });
          return;
        }
        if (data.type === 'expiryTime' && !isInitiator && !expiryTime) {
          expiryTime = data.time;
          updateTimer();
          timerInterval = setInterval(updateTimer, 1000);
          return;
        }
      }
      addMessage(data, 'peer');
    });
    conn.on('close', () => {
      statusEl.innerText = '❌ انقطع الاتصال.';
      inputMsg.disabled = true;
      sendBtn.disabled = true;
      conn = null;
    });
    conn.on('error', (err) => {
      console.error(err);
      statusEl.innerText = 'حدث خطأ في الاتصال.';
    });
  }

  function onConnectionOpen() {
    statusEl.innerText = '✅ تم الاتصال! يمكنكما التحدث الآن.';
    inputMsg.disabled = false;
    sendBtn.disabled = false;
    addSystemMsg('✅ تم الاتصال.');
    if (expiryTime) {
      updateTimer();
      clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 1000);
    }
    if (isInitiator && conn && conn.open) {
      conn.send({ type: 'visibilityConfig', visibleCount: visibleCount });
    }
    if (!isInitiator && conn && conn.open) {
      conn.send({ type: 'requestExpiry' });
    }
  }

  const urlParams = new URLSearchParams(window.location.search);
  const roomFromUrl = urlParams.get('room');

  if (roomFromUrl) {
    roomId = roomFromUrl;
    isInitiator = false;
    setupScreen.style.display = 'none';
    chatScreen.style.display = 'flex';
    statusEl.innerText = '⏳ في انتظار اتصال الطرف الآخر...';

    peer = new Peer();
    peer.on('open', (myId) => {
      const connection = peer.connect(roomId, { reliable: true });
      setupConnection(connection);
      connection.on('open', () => onConnectionOpen());
    });
    peer.on('error', (err) => {
      console.error('Peer error:', err);
      if (err.type === 'peer-unavailable') {
        statusEl.innerText = '❌ لا يمكن الوصول إلى الطرف الآخر. تأكد أن الرابط صحيح والطرف الآخر فتحه.';
      } else {
        statusEl.innerText = '⚠️ خطأ: ' + err.message;
      }
    });
  } else {
    setupScreen.style.display = 'flex';
    chatScreen.style.display = 'none';
  }

  createRoomBtn.addEventListener('click', () => {
    const durationMs = parseDuration(durationSelect.value);
    if (durationMs === 0) {
      const now = new Date();
      const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
      expiryTime = endOfDay.getTime();
    } else {
      expiryTime = Date.now() + durationMs;
    }
    visibleCount = parseInt(visibleCountSelect.value);
    isInitiator = true;
    roomId = generateRoomId();

    setupScreen.style.display = 'none';
    chatScreen.style.display = 'flex';
    statusEl.innerText = '⏳ في انتظار اتصال الطرف الآخر...';

    const newUrl = window.location.origin + window.location.pathname + '?room=' + roomId;
    window.history.replaceState({}, '', newUrl);

    peer = new Peer(roomId);
    peer.on('connection', (incomingConn) => {
      setupConnection(incomingConn);
      incomingConn.on('open', () => onConnectionOpen());
      if (incomingConn.open) onConnectionOpen();
    });
    peer.on('error', (err) => console.error('Peer error:', err));
  });

  copyLinkBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(window.location.href).then(() => alert('✅ تم النسخ!'));
  });
  qrBtn.addEventListener('click', () => {
    qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.location.href)}`;
    qrModal.style.display = 'flex';
  });
  closeQrBtn.addEventListener('click', () => qrModal.style.display = 'none');
  endChatBtn.addEventListener('click', () => {
    if (confirm('إنهاء المحادثة؟')) endChat('✖️ تم إنهاء المحادثة.');
  });

  sendBtn.addEventListener('click', () => {
    const msg = inputMsg.value.trim();
    if (!msg || !conn || !conn.open) return;
    addMessage(msg, 'me');
    conn.send(msg);
    inputMsg.value = '';
    conn.send({ type: 'typing', isTyping: false });
  });

  let typingTimeout;
  inputMsg.addEventListener('input', () => {
    if (!conn || !conn.open || chatEnded) return;
    conn.send({ type: 'typing', isTyping: true });
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => { if (conn && conn.open) conn.send({ type: 'typing', isTyping: false }); }, 1200);
  });
  inputMsg.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendBtn.click();
  });

  window.addEventListener('beforeunload', () => {
    if (conn && conn.open) conn.send({ type: 'end', reason: 'غادر المستخدم.' });
  });
</script>
</body>
</html>
