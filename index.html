<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>محادثة مؤقتة بين اثنين - مصححة</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 30px auto; padding: 0 15px; }
    #messages { height: 300px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #fafafa; }
    .msg { margin: 5px 0; }
    .me { color: blue; }
    .peer { color: green; }
    #roomId { font-weight: bold; background: #eee; padding: 4px 8px; border-radius: 4px; }
    input, button { font-size: 16px; padding: 8px; }
    #status { color: red; margin: 10px 0; }
    #expiryNote { font-size: 0.9em; color: #555; margin-top: 15px; }
  </style>
</head>
<body>
  <h2>💬 محادثة مؤقتة بين اثنين (لا تخزين)</h2>
  <p>معرّف الغرفة: <span id="roomId"></span></p>
  <p id="status">⏳ في انتظار اتصال الطرف الآخر...</p>
  <div id="messages"></div>
  <input type="text" id="inputMsg" placeholder="اكتب رسالتك..." disabled />
  <button id="sendBtn" disabled>إرسال</button>
  <p id="expiryNote">⚠️ هذه الغرفة تنتهي صلاحيتها بعد أسبوع من إنشائها.</p>

  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
  <script>
    const EXPIRY_DAYS = 7;
    const ROOM_PREFIX = "temp-chat-";

    function generateRoomId() {
      const now = new Date();
      const expiryDate = new Date(now.getTime() + EXPIRY_DAYS * 24 * 60 * 60 * 1000);
      const expiryStr = expiryDate.toISOString().split('T')[0];
      const randomPart = Math.random().toString(36).substring(2, 8);
      return `${ROOM_PREFIX}${expiryStr}-${randomPart}`;
    }

    const urlParams = new URLSearchParams(window.location.search);
    let roomId = urlParams.get('room');
    if (!roomId) {
      roomId = generateRoomId();
      const newUrl = window.location.origin + window.location.pathname + '?room=' + roomId;
      window.history.replaceState({}, '', newUrl);
    }

    function isRoomValid(roomId) {
      const prefix = ROOM_PREFIX;
      if (!roomId.startsWith(prefix)) return false;
      const dateStr = roomId.substring(prefix.length, prefix.length + 10);
      const expiryDate = new Date(dateStr);
      return new Date() <= expiryDate;
    }

    if (!isRoomValid(roomId)) {
      document.getElementById('status').innerText = '⚠️ انتهت صلاحية هذه الغرفة.';
      document.getElementById('expiryNote').innerText = '';
      throw new Error('Room expired');
    }

    document.getElementById('roomId').innerText = roomId;

    const messagesDiv = document.getElementById('messages');
    const inputMsg = document.getElementById('inputMsg');
    const sendBtn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');

    const peer = new Peer(roomId);
    let conn = null;

    // ---------- الطرف الذي يستقبل الاتصال (المتصفح الثاني) ----------
    peer.on('connection', (incomingConn) => {
      // عندما يتصل بنا أحد، نحفظ الاتصال ونجهزه
      conn = incomingConn;
      setupConnection(); // هنا الاتصال قادم من الخارج وسيكون مفتوحاً غالباً
      // لكننا أيضاً ننتظر حدث open تحسباً
      conn.on('open', () => {
        onConnectionOpen();
      });
      // لو كان مفتوحاً بالفعل (قد يكون الاتصال جاهزاً فوراً أحياناً)
      if (conn.open) onConnectionOpen();
    });

    // ---------- الطرف الذي يبدأ الاتصال (المتصفح الأول) ----------
    function connectToPeer() {
      if (conn) return;
      conn = peer.connect(roomId, { reliable: true });
      // ننتظر فتح الاتصال الحقيقي
      conn.on('open', () => {
        onConnectionOpen();
      });
      conn.on('error', (err) => {
        console.error(err);
        statusEl.innerText = 'فشل الاتصال. تأكد أن الرابط صحيح والطرف الآخر فتحه.';
      });
    }

    // تجهيز استقبال البيانات عند إنشاء الاتصال (سواء بادئ أو مستقبل)
    function setupConnection() {
      conn.on('data', (data) => {
        addMessage(data, 'peer');
      });
      conn.on('close', () => {
        statusEl.innerText = '❌ انقطع الاتصال.';
        inputMsg.disabled = true;
        sendBtn.disabled = true;
        conn = null;
      });
    }

    // عندما يصبح الاتصال مفتوحاً
    function onConnectionOpen() {
      statusEl.innerText = '✅ تم الاتصال! يمكنكما التحدث الآن.';
      inputMsg.disabled = false;
      sendBtn.disabled = false;
      // تأكد من أن setupConnection تم استدعاؤه مسبقاً (نستدعيه الآن لو لم يكن)
      if (!conn._events?.data) {
        setupConnection();
      }
    }

    // إضافة رسالة إلى الشاشة
    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = 'msg ' + (sender === 'me' ? 'me' : 'peer');
      div.textContent = (sender === 'me' ? 'أنت: ' : 'الطرف الآخر: ') + text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    sendBtn.addEventListener('click', () => {
      const msg = inputMsg.value.trim();
      if (!msg || !conn || !conn.open) return;
      addMessage(msg, 'me');
      conn.send(msg);
      inputMsg.value = '';
    });

    inputMsg.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendBtn.click();
    });

    // نحاول الاتصال تلقائياً بعد تحميل الصفحة (لكن بشرط عدم وجود اتصال قادم)
    setTimeout(() => {
      if (!conn) connectToPeer();
    }, 1500);
  </script>
</body>
</html>
